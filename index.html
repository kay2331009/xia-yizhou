    left: 50%;

    height: 120px;

    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .infinity-symbol {
    width: 120px;
    height: 80px;

  }

  .infinity-symbol svg {
    width: 100%;
    height: 100%;
  }

  @keyframes infinityPulse {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50%       { opacity: 0.35; transform: scale(1.03); }
  }

  /* Paper airplane flying in figure-8 around the ∞ symbol */
  .paper-plane {
    position: absolute;
    width: 16px;
    height: 16px;
    /* Center the plane on the infinity path center */
    top: 50%;
    left: 50%;
    margin-top: -8px;
    margin-left: -8px;
    animation: flyFigure8 6s linear infinite;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
  }

  .paper-plane svg {
    width: 100%;
    height: 100%;
  }

  /* Plane flies along the infinity figure-8 path, always pointing forward */
  /* Parametric: x=sin(t), y=sin(2t)/2; tangent angle = atan(cos(2t)/(2*cos(t))) */
  @keyframes flyFigure8 {
    0%    { transform: translate(0px,-50px) rotate(-90deg); }
    12.5% { transform: translate(40px,-30px) rotate(-35deg); }
    25%   { transform: translate(50px,0px)   rotate(8deg); }
    37.5% { transform: translate(40px,30px)  rotate(35deg); }
    50%   { transform: translate(0px,50px)   rotate(90deg); }
    62.5% { transform: translate(-40px,30px) rotate(145deg); }
    75%   { transform: translate(-50px,0px)  rotate(172deg); }
    87.5% { transform: translate(-40px,-30px) rotate(215deg); }
    100%  { transform: translate(0px,-50px)  rotate(270deg); }

  .book.flipped {

  s.style.animationDelay = Math.random() * 3 + 's';
  s.style.animationDuration = (2 + Math.random() * 3) + 's';
  const size = 1 + Math.random() * 2;
  s.style.width = size + 'px';
  s.style.height = size + 'px';
  starsEl.appendChild(s);
}

// Elements
const book = document.getElementById('book');
const inputArea = document.getElementById('inputArea');
const questionInput = document.getElementById('questionInput');
const askBtn = document.getElementById('askBtn');
const questionDisplay = document.getElementById('questionDisplay');
const subtitle = document.getElementById('subtitle');
const answerDisplay = document.getElementById('answerDisplay');
const calebNote = document.getElementById('calebNote');

askBtn.addEventListener('click', () => {
  const q = questionInput.value.trim();
  if (!q) { questionInput.focus(); return; }

  questionDisplay.textContent = '— ' + q + ' —';
  subtitle.textContent = '来自答案之书的回应';
  subtitle.classList.add('show');
  questionDisplay.classList.add('show');
  inputArea.classList.add('hidden');

  const idx = Math.floor(Math.random() * answers.length);
  answerDisplay.textContent = answers[idx];
  answerDisplay.classList.remove('show');
  calebNote.classList.remove('show');

  setTimeout(() => {
    book.classList.add('flipped');
  }, 200);

  setTimeout(() => {
    answerDisplay.classList.add('show');
    calebNote.textContent = calebNotes[idx];
    calebNote.classList.add('show');
  }, 800);
});

questionInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    askBtn.click();
  }
});

// Spacebar to go back to question input
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.target.matches('input, textarea, button')) {
    e.preventDefault();
    if (book.classList.contains('flipped')) {
      book.classList.remove('flipped');
      setTimeout(() => {
        questionDisplay.classList.remove('show');
        subtitle.classList.remove('show');
        inputArea.classList.remove('hidden');
        questionInput.value = '';
        questionInput.focus();
        answerDisplay.classList.remove('show');
        calebNote.classList.remove('show');
      }, 400);
    }
  }
});

// 总览功能
const overviewBtn = document.getElementById('overviewBtn');
const overviewOverlay = document.getElementById('overviewOverlay');
const overviewClose = document.getElementById('overviewClose');
const overviewGrid = document.getElementById('overviewGrid');

overviewBtn.addEventListener('click', () => {
  // Populate answers with Caleb notes
  overviewGrid.innerHTML = '';
  answers.forEach((ans, i) => {
    const item = document.createElement('div');
    item.className = 'overview-item';
    item.innerHTML = `<div style="font-size:0.9rem;letter-spacing:0.1em;margin-bottom:0.3rem">${ans}</div><div style="font-size:0.65rem;color:rgba(160,120,70,0.55);font-style:italic;letter-spacing:0.05em">${calebNotes[i]}</div>`;
    item.style.animationDelay = (i * 12) + 'ms';
    overviewGrid.appendChild(item);
  });
  overviewOverlay.classList.add('show');
  overviewBtn.style.display = 'none';
});

overviewClose.addEventListener('click', () => {
  overviewOverlay.classList.remove('show');
  overviewBtn.style.display = '';
});

overviewOverlay.addEventListener('click', (e) => {
  if (e.target === overviewOverlay) {
    overviewOverlay.classList.remove('show');
    overviewBtn.style.display = '';
  }
});
</script>

</body>
</html>
