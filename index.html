<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caleb · 指引你</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fontsapi.zeoseven.com/256/main/result.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0a00 0%, #2d1810 30%, #1a0a00 60%, #0d1a2d 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Huiwen-mincho', 'Noto Serif SC', 'Georgia', serif;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    height: 60vh;
    background: radial-gradient(ellipse, rgba(255,180,80,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .title {
    font-size: 2rem;
    color: #e8c89a;
    letter-spacing: 0.4em;
    margin-bottom: 1.5rem;
    text-shadow: 0 0 30px rgba(255,180,80,0.4);
    font-family: 'Huiwen-mincho', 'Noto Serif SC', serif;
    font-weight: normal;
    z-index: 2;
    position: relative;
  }

  /* ===== MÖBIUS STRIP ===== */
  .mobius-wrap {
    position: relative;
    width: 200px;
    height: 120px;
    margin-bottom: 1rem;
    z-index: 1;
  }

  .mobius-scene {
    width: 100%;
    height: 100%;
    perspective: 800px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mobius {
    width: 160px;
    height: 80px;
    position: relative;
    transform-style: preserve-3d;
    animation: mobiusRotate 12s linear infinite;
  }

  @keyframes mobiusRotate {
    from { transform: rotateX(10deg) rotateZ(0deg); }
    to   { transform: rotateX(10deg) rotateZ(360deg); }
  }

  /* Mobius ring - simplified visual using border-radius + 3D */
  .mobius-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-style: preserve-3d;
    animation: ringPulse 3s ease-in-out infinite;
  }

  @keyframes ringPulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(253,203,110,0.4)); }
    50%       { filter: drop-shadow(0 0 18px rgba(253,203,110,0.7)); }
  }

  .mobius-ring svg {
    overflow: visible;
  }

  /* Paper airplane */
  .paper-plane {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    transform-style: preserve-3d;
    animation: flyMobius 6s linear infinite;
    z-index: 10;
  }

  .paper-plane svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
  }

  /* 
    Möbius path: plane flies along a figure-8 / infinity loop.
    We simulate this by moving along X+Y with rotation.
  */
  @keyframes flyMobius {
    0%   { transform: translate(70px, 0px) rotate(0deg); }
    12%  { transform: translate(50px, -35px) rotate(-30deg); }
    25%  { transform: translate(0px, -50px) rotate(-90deg); }
    37%  { transform: translate(-50px, -35px) rotate(-150deg); }
    50%  { transform: translate(-70px, 0px) rotate(-180deg); }
    62%  { transform: translate(-50px, 35px) rotate(-210deg); }
    75%  { transform: translate(0px, 50px) rotate(-270deg); }
    87%  { transform: translate(50px, 35px) rotate(-330deg); }
    100% { transform: translate(70px, 0px) rotate(-360deg); }
  }

  /* ===== BOOK ===== */
  .book-wrap {
    perspective: 1000px;
    width: 360px;
    height: 500px;
    margin-bottom: 1rem;
    z-index: 2;
  }

  .book {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.4, 0.0, 0.2, 1);
    border-radius: 6px;
  }

  .book.flipped {
    transform: rotateX(-8deg) rotateY(180deg);
  }

  .page {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 4px 20px 20px 4px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .page-front {
    background: linear-gradient(155deg, #f5e6c8 0%, #ecd9a8 40%, #e0c890 100%);
    border-left: 4px solid #b89438;
    z-index: 2;
  }

  .page-back {
    background: linear-gradient(155deg, #f0ddb8 0%, #e4c89a 40%, #d8b870 100%);
    transform: rotateY(180deg);
    border-right: 4px solid #b89438;
    z-index: 1;
  }

  .page-front::before {
    content: '';
    position: absolute;
    left: 12px;
    top: 40px;
    bottom: 40px;
    width: 1px;
    background: rgba(160,120,40,0.2);
  }

  .page-corner {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, transparent 50%, rgba(180,140,60,0.25) 50%);
    border-radius: 0 0 20px 0;
  }

  .input-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    width: 100%;
  }

  .input-area.hidden { display: none; }

  .question-input {
    width: 100%;
    max-width: 280px;
    padding: 0.8rem 1.2rem;
    font-size: 1rem;
    border: 2px solid #c4a060;
    border-radius: 30px;
    background: rgba(255,255,255,0.8);
    color: #4a3010;
    text-align: center;
    outline: none;
    font-family: inherit;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .question-input::placeholder { color: #a08060; font-style: italic; }

  .question-input:focus {
    border-color: #e8a030;
    box-shadow: 0 0 20px rgba(255,180,80,0.3);
  }

  .ask-btn {
    padding: 0.7rem 2.5rem;
    font-size: 1rem;
    background: linear-gradient(135deg, #c4a060, #9a7030);
    color: #fff8e8;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    letter-spacing: 0.2em;
    font-family: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(160,120,48,0.4);
  }

  .ask-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(160,120,48,0.5);
  }

  .ask-btn:active { transform: translateY(0); }

  .question-display {
    font-size: 1.1rem;
    color: #4a3010;
    text-align: center;
    margin-bottom: 1rem;
    letter-spacing: 0.08em;
    line-height: 1.8;
    display: none;
    padding: 0 1rem;
  }

  .question-display.show { display: block; }

  .subtitle {
    font-size: 0.7rem;
    color: #a08060;
    letter-spacing: 0.2em;
    margin-bottom: 1.5rem;
    display: none;
  }

  .subtitle.show { display: block; }

  .answer-display {
    font-size: 1.5rem;
    color: #5a2a08;
    text-align: center;
    letter-spacing: 0.2em;
    line-height: 2.2;
    padding: 0 1rem;
    opacity: 0;
    transition: opacity 0.6s ease 0.6s;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .answer-display.show { opacity: 1; }

  .reset-btn {
    margin-top: 2rem;
    padding: 0.5rem 1.5rem;
    font-size: 0.85rem;
    background: transparent;
    color: #8a6030;
    border: 1px solid #c4a060;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.15em;
    font-family: inherit;
    transition: all 0.2s;
    display: none;
  }

  .reset-btn.show { display: block; }

  .reset-btn:hover {
    background: rgba(196,160,96,0.2);
    color: #5a3010;
  }

  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #e8c89a;
    border-radius: 50%;
    opacity: 0.5;
    animation: twinkle 3s infinite ease-in-out;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.8; }
  }

  .hint {
    font-size: 0.7rem;
    color: #8a7050;
    letter-spacing: 0.15em;
    margin-top: 1rem;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<h1 class="title">Caleb 指引你</h1>

<!-- Möbius strip + paper plane -->
<div class="mobius-wrap">
  <div class="mobius-scene">
    <div class="mobius">
      <!-- Möbius ring SVG -->
      <div class="mobius-ring">
        <svg width="160" height="80" viewBox="0 0 160 80">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#f9ca24" stop-opacity="0.9"/>
              <stop offset="50%"  stop-color="#e17055" stop-opacity="0.7"/>
              <stop offset="100%" stop-color="#f9ca24" stop-opacity="0.9"/>
            </linearGradient>
          </defs>
          <!-- Outer Möbius band using ellipse with thick stroke -->
          <ellipse cx="80" cy="40" rx="75" ry="28"
            fill="none"
            stroke="url(#ringGrad)"
            stroke-width="8"
            stroke-linecap="round"/>
          <!-- Inner subtle ellipse for depth -->
          <ellipse cx="80" cy="40" rx="75" ry="28"
            fill="none"
            stroke="rgba(255,220,100,0.15)"
            stroke-width="14"/>
        </svg>
      </div>

      <!-- Paper airplane flying along Möbius -->
      <div class="paper-plane">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 21L23 12L2 3V10L18 12L2 14V21Z" fill="white" stroke="#e8c89a" stroke-width="0.5"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<!-- Book -->
<div class="book-wrap">
  <div class="book" id="book">

    <div class="page page-front">
      <div class="input-area" id="inputArea">
        <textarea class="question-input" id="questionInput"
          placeholder="在此输入你的问题…"
          rows="2" maxlength="60"></textarea>
        <button class="ask-btn" id="askBtn">翻 书</button>
        <div class="hint">问题越具体，答案越准确</div>
      </div>
      <div class="question-display" id="questionDisplay"></div>
      <div class="subtitle" id="subtitle"></div>
    </div>

    <div class="page page-back">
      <div class="answer-display" id="answerDisplay"></div>
      <button class="reset-btn" id="resetBtn">再翻一次</button>
    </div>

    <div class="page-corner"></div>
  </div>
</div>

<script>
const answers = [
  "会的。",
  "不会。",
  "有可能。",
  "别想了，不会的。",
  "答案是肯定的。",
  "不要怀疑你自己。",
  "时机未到，再等等。",
  "这件事值得你去做。",
  "放弃吧，不值得。",
  "相信你的直觉。",
  "事情会往好的方向发展。",
  "你需要再坚持一下。",
  "这是个好兆头。",
  "别急，好事需要时间。",
  "你会后悔的。",
  "放手去做吧。",
  "答案就在你心里。",
  "不确定，但值得一试。",
  "很快就会有结果。",
  "别抱太大期望。",
  "这会是一次美好的经历。",
  "你比自己想象的更强。",
  "保持现状就好。",
  "是时候做出改变了。",
  "专心当下，其他的交给时间。",
  "会有意外惊喜。",
  "不如换个方向试试。",
  "这是命中注定的。",
  "你需要休息一下再想。",
  "勇敢一点。",
  "三思而后行。",
  "今天不适合做决定。",
  "明天会有答案。",
  "往积极的方向去想。",
  "不要犹豫了。",
  "也许吧，谁知道呢。",
  "你应该感到庆幸。",
  "这是一个新的开始。",
  "耐心等待的人会有好运气。",
  "有些事，不必追问。",
  "一切都会过去的。",
  "你值得拥有更好的。",
  "暂时还看不清。",
  "先行动，再调整。",
  "跟着心走。",
  "这是你应该做的选择。",
  "结果会让你满意的。",
  "不要勉强自己。",
  "好戏还在后头。",
  "去试试看吧。",
  "这件事由你来决定。",
  "不要太在意别人的看法。",
  "你需要的是时间。",
  "好事即将发生。",
  "不要放弃。",
  "想想你真正想要的是什么。",
  "你已经有了答案。",
  "这件事没那么简单。",
  "休息一下也无妨。",
  "这只是一个过程。",
  "你已经做得很好了。",
  "别把自己逼得太紧。",
  "事情会慢慢好起来的。",
  "你需要换一个思路。",
  "不要回头看。",
  "向前走就对了。",
  "你可以的。",
  "别担心，会解决的。",
  "这是你该走的路。",
  "你比自己以为的更厉害。",
  "不要想太多。",
  "答案已经很明显了。",
  "先接受再改变。",
  "你不需要向任何人证明。",
  "这只是一个小插曲。",
  "好事多磨。",
  "你需要相信过程。",
  "答案也许会迟到，但不会缺席。",
  "不要让恐惧阻止你。",
  "想想开心的事。",
  "这一步很关键。",
  "你会找到办法的。",
  "生活总会有办法的。",
  "不要让情绪控制你。",
  "你拥有比你想象的更多。",
  "有时候退一步海阔天空。",
  "该来的总会来。",
  "不要着急。",
  "保持平衡。",
  "这只是暂时的。",
  "一切都是最好的安排。",
  "你可以重新开始。",
];

function getAnswer() {
  return answers[Math.floor(Math.random() * answers.length)];
}

// Stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.animationDelay = Math.random() * 3 + 's';
  s.style.animationDuration = (2 + Math.random() * 3) + 's';
  const size = 1 + Math.random() * 2;
  s.style.width = size + 'px';
  s.style.height = size + 'px';
  starsEl.appendChild(s);
}

// Elements
const book = document.getElementById('book');
const inputArea = document.getElementById('inputArea');
const questionInput = document.getElementById('questionInput');
const askBtn = document.getElementById('askBtn');
const questionDisplay = document.getElementById('questionDisplay');
const subtitle = document.getElementById('subtitle');
const answerDisplay = document.getElementById('answerDisplay');
const resetBtn = document.getElementById('resetBtn');

askBtn.addEventListener('click', () => {
  const q = questionInput.value.trim();
  if (!q) { questionInput.focus(); return; }

  questionDisplay.textContent = '— ' + q + ' —';
  subtitle.textContent = '来自答案之书的回应';
  subtitle.classList.add('show');
  questionDisplay.classList.add('show');
  inputArea.classList.add('hidden');

  answerDisplay.textContent = getAnswer();
  answerDisplay.classList.remove('show');

  setTimeout(() => {
    book.classList.add('flipped');
  }, 200);

  setTimeout(() => {
    answerDisplay.classList.add('show');
    resetBtn.classList.add('show');
  }, 800);
});

resetBtn.addEventListener('click', () => {
  answerDisplay.classList.remove('show');
  resetBtn.classList.remove('show');
  book.classList.remove('flipped');
  setTimeout(() => {
    questionDisplay.classList.remove('show');
    subtitle.classList.remove('show');
    inputArea.classList.remove('hidden');
    questionInput.value = '';
    questionInput.focus();
  }, 400);
});

questionInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    askBtn.click();
  }
});
</script>

</body>
</html>
